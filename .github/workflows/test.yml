name: Unit Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Run unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.x"

      - name: Show Current Directory
        run: echo ${{github.workspace}} 

      - name: Restore dependencies
        run: |
          dotnet restore shared/Shared.Tests/Shared.Tests.csproj
          dotnet restore services/IdentityService/tests/IdentityService.Tests/IdentityService.Tests.csproj
          dotnet restore services/MealRecipeService/tests/MealRecipeService.Tests/MealRecipeService.Tests.csproj
          dotnet restore services/PlanService/tests/PlanService.Tests/PlanService.Tests.csproj
          dotnet restore services/ApiGateway/tests/ApiGateway.Tests/ApiGateway.Tests.csproj
        

      - name: Shared.Tests
        run: dotnet test shared/Shared.Tests/Shared.Tests.csproj --no-restore --logger "console;verbosity=normal"

      - name: IdentityService.Tests
        run: dotnet test services/IdentityService/tests/IdentityService.Tests/IdentityService.Tests.csproj --no-restore --logger "console;verbosity=normal"

      - name: MealRecipeService.Tests
        run: dotnet test services/MealRecipeService/tests/MealRecipeService.Tests/MealRecipeService.Tests.csproj --no-restore --logger "console;verbosity=normal"

      - name: PlanService.Tests
        run: dotnet test services/PlanService/tests/PlanService.Tests/PlanService.Tests.csproj --no-restore --logger "console;verbosity=normal"

      - name: ApiGateway.Tests
        run: dotnet test services/ApiGateway/tests/ApiGateway.Tests/ApiGateway.Tests.csproj --no-restore --logger "console;verbosity=normal"
